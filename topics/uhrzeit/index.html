/* ---- kleine Helfer ------------------------------------------------------ */
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
function el(tag, attrs={}, ...kids){
  const n=document.createElement(tag);
  for(const k in attrs){
    if(k==="class") n.className=attrs[k];
    else if(k==="html") n.innerHTML=attrs[k];
    else if(k.startsWith("on")&&typeof attrs[k]==="function") n.addEventListener(k.slice(2),attrs[k]);
    else if(attrs[k]!=null) n.setAttribute(k,attrs[k]);
  }
  for(const c of kids){ if(c==null) continue; n.append(c.nodeType?c:document.createTextNode(c)); }
  return n;
}
const SVGNS="http://www.w3.org/2000/svg";
function svgEl(tag,attrs={}){const n=document.createElementNS(SVGNS,tag);for(const k in attrs)n.setAttribute(k,attrs[k]);return n;}
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
const pad=n=>String(n).padStart(2,"0");

/* ---- Zeit-Vokabular (Deutsch, Klasse 2) -------------------------------- */
function h12(h){h=((h%12)+12)%12;return h===0?12:h;}
function wordsStd(h,m){              // Standardform: Viertel nach / halb / X vor
  const H=h12(h), N=h12(h+1);
  if(m===0)  return H+" Uhr";
  if(m===15) return "Viertel nach "+H;
  if(m===30) return "halb "+N;
  if(m===45) return "Viertel vor "+N;
  if(m<30)   return m+" nach "+H;
  return (60-m)+" vor "+N;
}
function wordsShort(h,m){            // mundartliche Kurzform aus dem Buch
  const N=h12(h+1);
  if(m===15) return "viertel "+N;
  if(m===45) return "drei viertel "+N;
  if(m===30) return "halb "+N;
  if(m===0)  return h12(h)+" Uhr";
  return null;
}
function uhrText(h,m){return m===0?(h+" Uhr"):(h+"."+pad(m)+" Uhr");} // "8.30 Uhr"
function digital(h,m){return pad(h)+":"+pad(m);}                      // "08:30"

/* ---- Ton (WebAudio, ohne Dateien) -------------------------------------- */
const Sound=(()=>{
  let ctx=null, on=true;
  function ac(){ if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
    if(ctx.state==="suspended"){ ctx.resume(); }   // Autoplay-Regeln: bei Bedarf wieder aufwecken
    return ctx; }
  // Audio beim ersten Antippen/Klick „entsperren" (Browser erlauben Ton erst nach Nutzer-Geste)
  ["pointerdown","touchstart","keydown","click"].forEach(ev=>
    window.addEventListener(ev,()=>{ try{ ac(); }catch(e){} },{passive:true}));
  function tone(f,t,dur,type="sine",vol=.18){
    if(!on) return; const c=ac(); const o=c.createOscillator(),g=c.createGain();
    o.type=type;o.frequency.setValueAtTime(f,t);o.connect(g);g.connect(c.destination);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.start(t);o.stop(t+dur);
  }
  return {
    set(v){on=v;},
    get(){return on;},
    click(){if(!on)return;const t=ac().currentTime;tone(440,t,.07,"triangle",.12);},
    tick(){if(!on)return;const t=ac().currentTime;tone(900,t,.03,"square",.05);},
    good(){if(!on)return;const t=ac().currentTime;[523,659,784].forEach((f,i)=>tone(f,t+i*.09,.18,"sine",.16));},
    great(){if(!on)return;const t=ac().currentTime;[523,659,784,1046,1318].forEach((f,i)=>tone(f,t+i*.1,.25,"sine",.16));},
    wrong(){if(!on)return;const t=ac().currentTime;tone(280,t,.18,"sawtooth",.1);tone(200,t+.12,.22,"sawtooth",.1);},
    win(){if(!on)return;const t=ac().currentTime;[523,587,659,784,880,1046].forEach((f,i)=>tone(f,t+i*.12,.3,"triangle",.16));}
  };
})();

/* ---- Konfetti ----------------------------------------------------------- */
const Confetti=(()=>{
  const cv=$("#confetti"),cx=cv.getContext("2d");let parts=[],raf=null;
  function size(){cv.width=innerWidth;cv.height=innerHeight;}
  addEventListener("resize",size);
  const COL=["#ff7a59","#ffd23f","#36c98d","#3aa0ff","#9b6bff","#ff79c6"];
  function burst(n=160){
    size();cv.style.display="block";
    for(let i=0;i<n;i++)parts.push({x:innerWidth/2+rnd(-60,60),y:innerHeight/3,
      vx:rnd(-90,90)/10,vy:rnd(-150,-40)/10,g:.18+Math.random()*.12,
      s:rnd(6,13),c:pick(COL),r:Math.random()*6,vr:(Math.random()-.5)*.5,life:rnd(80,140)});
    if(!raf)loop();
  }
  function loop(){
    cx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.life--;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;
      cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);cx.restore();});
    parts=parts.filter(p=>p.life>0&&p.y<cv.height+30);
    if(parts.length)raf=requestAnimationFrame(loop);
    else{raf=null;cv.style.display="none";}
  }
  return {burst};
})();

/* =========================================================================
   UHR-KOMPONENTE  (SVG, zieh- und einstellbar)
   ========================================================================= */
function Clock(opts={}){
  // opts: h,m, show24(bool), draggable(bool), minStep(1|5|15|30), onChange(fn)
  const st={h:opts.h??9, m:opts.m??0, show24:!!opts.show24,
            drag:!!opts.draggable, step:opts.minStep||1, onChange:opts.onChange||null};
  const C=120,R=110;
  const svg=svgEl("svg",{class:"clock",viewBox:"0 0 240 240"});
  // Verlauf
  const defs=svgEl("defs");
  defs.innerHTML=`<radialGradient id="faceGrad" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#eaf3ff"/></radialGradient>`;
  svg.append(defs);
  svg.append(svgEl("circle",{class:"face",cx:C,cy:C,r:R}));
  // Minutenstriche + Stundenstriche
  for(let i=0;i<60;i++){
    const a=i*6*Math.PI/180, big=i%5===0;
    const r1=R-(big?16:8), r2=R-3;
    svg.append(svgEl("line",{class:"tick"+(big?" big":""),
      x1:C+r1*Math.sin(a),y1:C-r1*Math.cos(a),x2:C+r2*Math.sin(a),y2:C-r2*Math.cos(a)}));
  }
  // Zahlen 1–12
  for(let n=1;n<=12;n++){
    const a=n*30*Math.PI/180, rr=R-32;
    const t=svgEl("text",{class:"num",x:C+rr*Math.sin(a),y:C-rr*Math.cos(a),"font-size":"22"});
    t.textContent=n; svg.append(t);
  }
  // 24h-Zahlen (innen) optional
  const ring24=svgEl("g");
  for(let k=1;k<=12;k++){
    const a=k*30*Math.PI/180, rr=R-52;
    const t=svgEl("text",{class:"num24",x:C+rr*Math.sin(a),y:C-rr*Math.cos(a)});
    t.textContent = (k+12);            // 13..24 (24 oben bei der 12)
    ring24.append(t);
  }
  if(st.show24) svg.append(ring24);
  // Zeiger
  const hHit=svgEl("line",{class:"hand hit",x1:C,y1:C,x2:C,y2:C-50});
  const hHour=svgEl("line",{class:"hand hour",x1:C,y1:C,x2:C,y2:C-58});
  const mHit=svgEl("line",{class:"hand hit",x1:C,y1:C,x2:C,y2:C-84});
  const mMin=svgEl("line",{class:"hand minute",x1:C,y1:C,x2:C,y2:C-88});
  svg.append(hHit,hHour,mHit,mMin,svgEl("circle",{class:"cap",cx:C,cy:C,r:8}));

  function render(){
    const ha=(h12(st.h)%12)*30 + st.m*0.5;
    const ma=st.m*6;
    hHour.setAttribute("transform",`rotate(${ha} ${C} ${C})`);
    hHit .setAttribute("transform",`rotate(${ha} ${C} ${C})`);
    mMin .setAttribute("transform",`rotate(${ma} ${C} ${C})`);
    mHit .setAttribute("transform",`rotate(${ma} ${C} ${C})`);
    if(st.onChange) st.onChange(st.h,st.m);
  }
  // Ziehen
  function angleFromEvent(ev){
    const r=svg.getBoundingClientRect();
    const px=(ev.touches?ev.touches[0]:ev).clientX, py=(ev.touches?ev.touches[0]:ev).clientY;
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const dx=px-cx, dy=py-cy;
    let a=Math.atan2(dx,-dy)*180/Math.PI; if(a<0)a+=360; return a;
  }
  let active=null;
  function down(which,ev){ if(!st.drag)return; ev.preventDefault(); active=which;
    (which==="m"?mMin:hHour).classList.add("dragging");
    move(ev);
  }
  function move(ev){
    if(!active)return; ev.preventDefault();
    const a=angleFromEvent(ev);
    if(active==="m"){
      let m=Math.round(a/6); m=Math.round(m/st.step)*st.step; m=((m%60)+60)%60;
      if(m!==st.m){Sound.tick();}
      st.m=m;
    }else{
      let h=Math.round(a/30); h=((h%12)+12)%12; if(h===0)h=12;
      // behalte 12/24-Kontext grob bei
      const was24 = st.h>=12 && st.h!==12 ? true : (st.h===0);
      st.h = h===12?12:h;
    }
    render();
  }
  function up(){ if(!active)return; (active==="m"?mMin:hHour).classList.remove("dragging"); active=null; }
  hHit.addEventListener("pointerdown",e=>down("h",e));
  mHit.addEventListener("pointerdown",e=>down("m",e));
  // ziehbarer Bereich auch direkt auf den Zeigern
  hHour.addEventListener("pointerdown",e=>down("h",e));
  mMin .addEventListener("pointerdown",e=>down("m",e));
  window.addEventListener("pointermove",move);
  window.addEventListener("pointerup",up);

  render();
  return {
    svg,
    set(h,m){st.h=h;if(m!=null)st.m=m;render();},
    get(){return {h:st.h,m:st.m};},
    setDrag(v){st.drag=v;[hHour,mMin].forEach(e=>e.style.cursor=v?"grab":"default");},
    setStep(s){st.step=s;},
    show24(v){if(v&&!ring24.parentNode)svg.insertBefore(ring24,hHit);else if(!v&&ring24.parentNode)ring24.remove();st.show24=v;},
    glow(v){svg.classList.toggle("glow",!!v);}
  };
}

/* +/- Steuerung für eine Uhr (kindgerecht, touch-freundlich) */
function clockControls(clock,{hourStep=1,minStep=1,showHour=true,showMin=true,hour24=true}={}){
  const wrap=el("div",{class:"setrow"});
  function grp(label,cls,onMinus,onPlus){
    const g=el("div",{class:"setgrp"});
    g.append(el("div",{class:"lab"},label));
    const ctr=el("div",{class:"ctr"});
    ctr.append(
      el("button",{class:"stepbtn "+cls,onclick:()=>{Sound.click();onMinus();}},"−"),
      el("span",{class:"val "+cls+"v"},"--"),
      el("button",{class:"stepbtn "+cls,onclick:()=>{Sound.click();onPlus();}},"+")
    );
    g.append(ctr);return g;
  }
  function upd(){const {h,m}=clock.get();
    const hv=wrap.querySelector(".hv"),mv=wrap.querySelector(".mv");
    if(hv)hv.textContent = hour24 ? h : h12(h);
    if(mv)mv.textContent=pad(m);}
  if(showHour)wrap.append(grp("Stunde","h",
    ()=>{let{h}=clock.get(); h = hour24 ? (h-hourStep+24)%24 : (h12(h)-hourStep<1?12:h12(h)-hourStep); clock.set(h);upd();},
    ()=>{let{h}=clock.get(); h = hour24 ? (h+hourStep)%24 : (h12(h)+hourStep>12?1:h12(h)+hourStep); clock.set(h);upd();}));
  if(showMin)wrap.append(grp("Minute","m",
    ()=>{let{h,m}=clock.get();m-=minStep;if(m<0){m+=60;}clock.set(h,m);upd();},
    ()=>{let{h,m}=clock.get();m+=minStep;if(m>=60){m-=60;}clock.set(h,m);upd();}));
  upd();
  return wrap;
}

/* =========================================================================
   BILDSCHIRM-STEUERUNG  (Hub  +  Station-Ablauf)
   ========================================================================= */
const STATIONS=[
  {id:"tageszeiten", n:"Tageszeiten", e:"🌅", c:"--brand"},
  {id:"dieuhr",      n:"Die Uhr kennenlernen", e:"🕰️", c:"--blue"},
  {id:"vollehalbe",  n:"Volle & halbe Stunden", e:"🕘", c:"--green"},
  {id:"viertel",     n:"Viertelstunden", e:"🕓", c:"--purple"},
  {id:"minuten",     n:"Minuten genau", e:"🕔", c:"--pink"},
  {id:"digital",     n:"Digital & 24 Stunden", e:"📟", c:"--blue"},
  {id:"zeitspannen", n:"Zeitspannen", e:"⏳", c:"--brand"},
  {id:"einheiten",   n:"Stunden · Minuten · Sekunden", e:"⏱️", c:"--green"},
  {id:"meister",     n:"Meister-Challenge", e:"🏆", c:"--gold", master:true},
];
const STATION_DATA={}; // wird im Stations-Abschnitt befüllt

function setScreen(node){const s=$("#screen");s.innerHTML="";s.append(node);window.scrollTo(0,0);}
function updTotal(){$("#totalStars").textContent=Store.total();}

function renderHub(){
  updTotal();
  const wrap=el("div",{class:"screen"});
  wrap.append(el("h1",{class:"hub-title"},"⏰ Zeit-Abenteuer"));
  wrap.append(el("div",{class:"hub-sub"},"Werde zum Uhren-Meister! Wähle eine Station."));
  wrap.append(mascotRow(welcomeText(),"happy"));

  // „Weitermachen"-Knopf, falls eine Station noch offen ist
  const prog=Store.getProgress();
  if(prog && STATION_DATA[prog.id]){
    const ps=STATIONS.find(x=>x.id===prog.id);
    const cont=el("div",{class:"center",style:"margin:2px 0 12px"});
    cont.append(el("button",{class:"btn green lg",onclick:()=>{Sound.click();startStation(prog.id,prog);}},
      "▶ Weitermachen: "+(ps?ps.n:"")+" – Aufgabe "+((prog.i||0)+1)));
    wrap.append(cont);
  }

  const grid=el("div",{class:"stations"});
  let prevDone=true;
  STATIONS.forEach((s,i)=>{
    const stars=Store.stars(s.id), done=Store.data.done[s.id];
    const locked = !prevDone && !done;       // nächste Station erst nach Vorgänger
    const card=el("div",{class:"station"+(s.master?" master":"")+(done?" done":"")+(locked?" locked":"")});
    card.style.borderColor = done? "var(--gold)":"transparent";
    card.append(el("span",{class:"num"},String(i+1)));
    card.append(el("span",{class:"emoji"},s.e));
    card.append(el("div",{class:"nm"},s.n));
    const sd=el("div",{class:"stars"});
    for(let k=0;k<3;k++)sd.append(el("span",{class:"s"+(k<stars?" on":"")},"★"));
    card.append(sd);
    if(!locked) card.addEventListener("click",()=>{Sound.click();startStation(s.id);});
    grid.append(card);
    prevDone = done; // Freischaltung der nächsten Station
  });
  wrap.append(grid);

  // Fußzeile
  const foot=el("div",{class:"center",style:"margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"});
  foot.append(el("button",{class:"btn gray",onclick:()=>{location.href="../../index.html";}},"← Themen"));
  foot.append(el("button",{class:"btn gray",onclick:()=>{
      if(confirm("Fortschritt in diesem Thema zurücksetzen?")){Store.reset();renderHub();}
    }},"↺ Neu starten"));
  if(Cloud.ready()){
    foot.append(el("button",{class:"btn blue",onclick:()=>{Sound.click();renderCodeScreen(false);}},
      "☁️ Code: "+(SchoolCloud.code()||"—")));
  }
  wrap.append(foot);
  setScreen(wrap);
}
function welcomeText(){
  const t=Store.total();
  if(t===0) return "Hallo! Ich bin <b>Tikki die Eule</b> 🦉. Zusammen lernen wir die <b>Uhr</b> – Schritt für Schritt mit vielen Spielen!";
  if(t<8)  return "Schön, dass du wieder da bist! Du hast schon <b>"+t+" Sterne</b> ⭐ gesammelt. Weiter geht's!";
  if(t<20) return "Super Fortschritt – <b>"+t+" Sterne</b>! Du wirst immer besser im Uhrenlesen. 💪";
  return "Wow, <b>"+t+" Sterne</b>! Du bist ein echter Zeit-Profi. 🏆";
}

/* ---- Station-Ablauf: Lernkarten -> Übungen -> Ergebnis ----------------- */
function startStation(id,resume){
  const data=STATION_DATA[id];
  if(!data){toast("Diese Station wird noch gebaut …");return;}
  const teach=(typeof data.teach==="function"?data.teach():data.teach)||[];
  const exercises=(typeof data.exercises==="function"?data.exercises():data.exercises)||[];
  let ti=0;
  // Beim Weitermachen direkt zu den Übungen springen (Lernkarten überspringen)
  if(resume){ runExercises(id,exercises,resume); return; }
  if(teach.length) showTeach(); else runExercises(id,exercises);

  function showTeach(){
    const card=teach[ti];
    const scr=el("div",{class:"screen"});
    scr.append(stationHeader(id,"Erklärung "+(ti+1)+"/"+teach.length));
    const body=el("div",{class:"card"});
    if(card.render){ card.render(body); }
    else {
      if(card.title) body.append(el("h2",{class:"center"},card.title));
      if(card.html)  body.append(el("div",{class:"center",html:card.html}));
    }
    scr.append(card.mascot? mascotRow(card.mascot,card.mood||"think"):document.createTextNode(""));
    scr.append(body);
    const nav=el("div",{class:"center",style:"margin-top:8px"});
    nav.append(el("button",{class:"btn lg green",onclick:()=>{
      Sound.click(); ti++;
      if(ti<teach.length) showTeach(); else runExercises(id,exercises);
    }}, ti<teach.length-1?"Weiter →":"Los, üben! ✏️"));
    scr.append(nav);
    setScreen(scr);
  }
}

function stationHeader(id,step){

  bar.append(el("div",{class:"steplabel"},step||""));
  return bar;
}

/* ---- Übungs-Engine ------------------------------------------------------ */
function runExercises(id,list,resume){
  let i=resume && resume.i<list.length ? resume.i : 0,
      correctCount=resume ? resume.correctCount||0 : 0,
      attemptsThis=0,
      wrongTotal=resume ? resume.wrongTotal||0 : 0;
  next();

  function next(){
    if(i>=list.length){ return finish(); }
    // Position sichern, damit man nach einem Neuladen genau hier weitermacht
    Store.saveProgress({id, i, correctCount, wrongTotal});
    const ex=list[i]; attemptsThis=0;
    const scr=el("div",{class:"screen"});
    scr.append(stationHeader(id));
    // Fortschritt
    const pr=el("div",{class:"card"});
    const bar=el("div",{class:"progress"});const fill=el("i");bar.append(fill);
    pr.append(bar);
    fill.style.width=(i/list.length*100)+"%";
    pr.append(el("div",{class:"steplabel"},"Aufgabe "+(i+1)+" von "+list.length));
    scr.append(pr);

    const host=el("div",{class:"card"});
    scr.append(host);
    const fb=el("div",{class:"feedback"});scr.append(fb);
    setScreen(scr);

    const api={
      done:(ok)=>{ // wird vom Renderer gerufen
        if(ok){correctCount++; fill.style.width=((i+1)/list.length*100)+"%";}
        afterAnswer(ok,ex,fb,()=>{ i++; next(); });
      },
      wrong:()=>{attemptsThis++; wrongTotal++;},
      attempts:()=>attemptsThis,
      feedback:fb
    };
    renderExercise(ex,host,api);
  }

  function afterAnswer(ok,ex,fb,cont){
    fb.className="feedback show "+(ok?"ok":"no");
    fb.innerHTML="";
    fb.append(el("span",{class:"fi"},ok?"🎉":"💡"));
    const msg=el("div");
    msg.innerHTML = ok ? pick(["Super gemacht!","Richtig! ⭐","Klasse!","Genau richtig!","Toll!"])
                       : (ex.explain||"Schau noch einmal genau hin.");
    fb.append(msg);
    if(ok)Sound.good(); else Sound.wrong();
    const btn=el("button",{class:"btn "+(ok?"green":"blue"),style:"margin-left:auto",
      onclick:()=>{Sound.click();fb.classList.remove("show");cont();}}, ok?"Weiter →":"Nochmal versuchen");
    if(ok){ fb.append(btn); }
    else {
      // bei Fehler: kurzer Hinweis, dann erneut dieselbe Aufgabe
      const b2=el("button",{class:"btn blue",style:"margin-left:auto",
        onclick:()=>{Sound.click();fb.classList.remove("show");retry();}},"Nochmal →");
      fb.append(b2);
    }
    function retry(){ // gleiche Aufgabe neu rendern
      const host=fb.previousSibling; // card
      host.innerHTML=""; renderExercise(ex,host,{
        done:(ok2)=>{ if(ok2){correctCount++;} afterAnswer(ok2,ex,fb,()=>{i++;next();}); },
        wrong:()=>{wrongTotal++;}, attempts:()=>1, feedback:fb
      });
    }
  }

  function finish(){
    Store.clearProgress();   // Station fertig – kein offener Fortschritt mehr
    // Sterne: 3 (keine Fehler), 2 (wenige), 1 (geschafft)
    let stars = wrongTotal===0?3 : (wrongTotal<=2?2:1);
    Store.setStars(id,stars); updTotal();
    const isMaster = id==="meister";
    const scr=el("div",{class:"result screen"});
    scr.append(stationHeader(id,"Geschafft!"));
    const card=el("div",{class:"card center"});
    card.append(el("div",{class:"huge"}, isMaster?"🏆 MEISTER! 🏆":"Geschafft! 🎉"));
    const st=el("div",{class:"bigstars"});
    for(let k=0;k<3;k++)st.append(el("span",{class:"s"},"★"));
    card.append(st);
    card.append(el("p",{class:"big"}, starMsg(stars)));
    if(isMaster){
      card.append(el("div",{class:"badge"},"🏅"));
      card.append(el("p",{},"Du hast die <b>Uhrzeit gemeistert</b>! Du kannst die Uhr lesen, einstellen und mit Zeit rechnen."));
      card.lastChild.innerHTML=card.lastChild.textContent; // allow <b>
    }
    const nav=el("div",{style:"margin-top:10px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"});
    nav.append(el("button",{class:"btn green lg",onclick:()=>{Sound.click();renderHub();}},"🗺️ Zur Karte"));
    nav.append(el("button",{class:"btn blue",onclick:()=>{Sound.click();startStation(id);}},"↻ Nochmal"));
    // nächste Station
    const idx=STATIONS.findIndex(s=>s.id===id);
    if(idx<STATIONS.length-1){
      nav.append(el("button",{class:"btn",onclick:()=>{Sound.click();startStation(STATIONS[idx+1].id);}},
        "Nächste Station →"));
    }
    card.append(nav);
    scr.append(card);
    setScreen(scr);
    // Animationen
    setTimeout(()=>{ const ss=$$(".bigstars .s");
      for(let k=0;k<stars;k++)setTimeout(()=>{ss[k].classList.add("on");Sound.good();},k*350);
    },200);
    if(stars>=3||isMaster){Confetti.burst(isMaster?260:160);Sound.win();}
    else if(stars===2){Confetti.burst(90);Sound.great();}
  }
  function starMsg(s){return s===3?"Perfekt – ganz ohne Fehler!":s===2?"Sehr gut gemacht!":"Geschafft – Übung macht den Meister!";}
}

/* =========================================================================
   ÜBUNGS-RENDERER  (ein Typ-Schalter für alle Aufgabenarten)
   Aufgaben-Spezifikation:
     {type:"info",  render(host,api)}                      eigenes Mini-Spiel
     {type:"mc", q, options:[{label|clock|html, ok}], explain}
     {type:"readClock", h,m, options:[...], explain}       (Sonderfall von mc)
     {type:"setClock", target:{h,m}, prompt, minStep, check, explain}
     {type:"sort", q, items:[{t,b}], buckets:[{id,head,emoji}], explain}
     {type:"match", q, pairs:[[a,b]], render?, explain}
     {type:"order", q, items:[{label,val}], explain}
     {type:"tf", q, answer(bool), explain}
     {type:"input", q, answer, suffix, explain}
   ========================================================================= */
function renderExercise(ex,host,api){
  const fn=RENDER[ex.type]||RENDER.mc;
  fn(ex,host,api);
}
const RENDER={};

/* freie Render-Funktion (für Lern-/Sonderspiele) */
RENDER.info=(ex,host,api)=>{ ex.render(host,api); };

/* Multiple-Choice (Text, Uhr oder HTML als Option) */
RENDER.mc=(ex,host,api)=>{
  if(ex.mascot)host.append(mascotRow(ex.mascot,ex.mood||"think"));
  if(ex.q)host.append(el("div",{class:"center big",html:ex.q}));
  if(ex.clock){ const c=Clock({h:ex.clock.h,m:ex.clock.m,show24:ex.clock.show24});
    const w=el("div",{class:"clock-wrap"});w.append(c.svg);host.append(w);}
  if(ex.digital){host.append(el("div",{class:"center",style:"margin:10px"},
     el("span",{class:"digital"+(ex.digital.red?" red":"")},ex.digital.text)));}
  if(ex.hint)host.append(hintBlock(ex.hint));
  const grid=el("div",{class:"options"+(ex.cols2?" cols2":"")});
  shuffle(ex.options.map((o,idx)=>({o,idx}))).forEach(({o})=>{
    const opt=el("div",{class:"opt"});
    if(o.clock){const c=Clock({h:o.clock.h,m:o.clock.m,show24:o.clock.show24});
      c.svg.style.width="120px";c.svg.style.height="120px";opt.append(c.svg);}
    else if(o.html)opt.innerHTML=o.html;
    else opt.append(document.createTextNode(o.label));
    opt.addEventListener("click",()=>{
      if(grid.dataset.lock)return;
      grid.dataset.lock="1"; grid.style.pointerEvents="none";
      if(o.ok){opt.classList.add("correct");api.done(true);}
      else{opt.classList.add("wrong");api.wrong();api.done(false);}
    });
    grid.append(opt);
  });
  host.append(grid);
};
RENDER.readClock=(ex,host,api)=>{ RENDER.mc(ex,host,api); };

/* Uhr einstellen (mit +/- Knöpfen, prüft Stunde&Minute) */
RENDER.setClock=(ex,host,api)=>{
  if(ex.mascot)host.append(mascotRow(ex.mascot,"think"));
  host.append(el("div",{class:"center big",html:ex.prompt}));
  if(ex.hint)host.append(hintBlock(ex.hint));
  const start=ex.start||{h:12,m:0};
  const c=Clock({h:start.h,m:start.m,show24:ex.show24,draggable:!!ex.drag,minStep:ex.minStep||1});
  const w=el("div",{class:"clock-wrap"});w.append(c.svg);
  if(ex.show24)c.show24(true);
  host.append(w);
  host.append(clockControls(c,{hourStep:ex.hourStep||1,minStep:ex.minStep||1,
    showHour:ex.showHour!==false,showMin:ex.showMin!==false,
    hour24:!!(ex.match24||ex.show24)}));
  const chk=el("div",{class:"center",style:"margin-top:12px"});
  chk.append(el("button",{class:"btn green lg",onclick:()=>{
    const {h,m}=c.get(); const t=ex.target;
    const okH = ex.ignoreHour? true : (ex.match24? h===t.h : h12(h)===h12(t.h));
    const okM = m===t.m;
    if(okH&&okM){c.glow(true);api.done(true);}
    else{api.wrong();
      if(!okM&&okH)toast("Die Minuten stimmen noch nicht 🕐");
      else if(okM&&!okH)toast("Die Stunde stimmt noch nicht 🕐");
      else toast("Stunde und Minute prüfen 🕐");
      api.done(false);
    }
  }},"✓ Fertig"));
  host.append(chk);
};

/* Sortieren in Eimer (Drag & Drop, touch-fähig) */
RENDER.sort=(ex,host,api)=>{
  if(ex.mascot)host.append(mascotRow(ex.mascot,"think"));
  host.append(el("div",{class:"center big",html:ex.q}));
  const pool=el("div",{class:"dnd-pool"});
  const buckets=el("div",{class:"buckets"});
  const items=shuffle(ex.items.map((it,idx)=>({...it,idx})));
  const need=items.length; let placed=0;
  items.forEach(it=>{
    const chip=el("div",{class:"chip",draggable:"false"});chip.textContent=it.t;chip.dataset.b=it.b;
    makeDraggable(chip);pool.append(chip);
  });
  ex.buckets.forEach(b=>{
    const bk=el("div",{class:"bucket"});bk.dataset.id=b.id;
    bk.append(el("div",{class:"bemoji"},b.emoji||""));
    bk.append(el("div",{class:"bhead"},b.head));
    const drop=el("div",{class:"bdrop"});bk.append(drop);
    buckets.append(bk);
  });
  host.append(pool);host.append(buckets);

  function makeDraggable(chip){
    let drag=null,ox=0,oy=0,ghostParent=null;
    chip.addEventListener("pointerdown",e=>{
      if(chip.classList.contains("placed"))return;
      e.preventDefault();drag=chip;chip.setPointerCapture(e.pointerId);
      const r=chip.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;
      chip.classList.add("drag");chip.style.position="fixed";chip.style.zIndex=60;
      chip.style.left=(e.clientX-ox)+"px";chip.style.top=(e.clientY-oy)+"px";
      document.body.append(chip);
    });
    chip.addEventListener("pointermove",e=>{
      if(!drag)return;e.preventDefault();
      chip.style.left=(e.clientX-ox)+"px";chip.style.top=(e.clientY-oy)+"px";
      $$(".bucket",buckets).forEach(bk=>{
        const r=bk.getBoundingClientRect();
        const over=e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom;
        bk.classList.toggle("over",over);
      });
    });
    chip.addEventListener("pointerup",e=>{
      if(!drag)return;drag=null;chip.classList.remove("drag");
      let target=null;
      $$(".bucket",buckets).forEach(bk=>{
        const r=bk.getBoundingClientRect();
        if(e.clientX>r.left&&e.clientX<r.right&&e.clientY>r.top&&e.clientY<r.bottom)target=bk;
        bk.classList.remove("over");
      });
      chip.style.position="";chip.style.left="";chip.style.top="";chip.style.zIndex="";
      if(target&&target.dataset.id===chip.dataset.b){
        chip.classList.add("placed");Sound.good();
        target.querySelector(".bdrop").append(chip);
        placed++;
        if(placed>=need){ setTimeout(()=>api.done(true),250); }
      }else if(target){
        Sound.wrong();api.wrong();chip.classList.add("drag");
        setTimeout(()=>chip.classList.remove("drag"),200);
        pool.append(chip);toast(ex.wrongHint||"Das passt hier nicht – versuch es nochmal!");
      }else{
        pool.append(chip);
      }
    });
  }
};

/* Paare verbinden (Klicken: links wählen, rechts wählen) */
RENDER.match=(ex,host,api)=>{
  if(ex.mascot)host.append(mascotRow(ex.mascot,"think"));
  host.append(el("div",{class:"center big",html:ex.q}));
  const cols=el("div",{class:"matchcols"});
  const left=el("div",{class:"matchcol"}),right=el("div",{class:"matchcol"});
  cols.append(left,right);host.append(cols);
  const L=shuffle(ex.pairs.map((p,i)=>({v:p[0],i}))),
        R=shuffle(ex.pairs.map((p,i)=>({v:p[1],i})));
  let sel=null, doneN=0;
  function mk(side,obj){
    const it=el("div",{class:"matchitem"});
    if(typeof obj.v==="object"&&obj.v.clock){const c=Clock(obj.v.clock);c.svg.style.width="100px";c.svg.style.height="100px";it.append(c.svg);}
    else it.innerHTML=obj.v;
    it.dataset.i=obj.i;it.dataset.side=side;
    it.addEventListener("click",()=>{
      if(it.classList.contains("done"))return;
      if(!sel){sel=it;it.classList.add("sel");Sound.click();return;}
      if(sel===it){it.classList.remove("sel");sel=null;return;}
      if(sel.dataset.side===side){sel.classList.remove("sel");sel=it;it.classList.add("sel");return;}
      // Paar prüfen
      if(sel.dataset.i===it.dataset.i){
        sel.classList.remove("sel");sel.classList.add("done");it.classList.add("done");
        Sound.good();sel=null;doneN++;
        if(doneN>=ex.pairs.length)setTimeout(()=>api.done(true),250);
      }else{
        const a=sel;a.classList.add("bad");it.classList.add("bad");Sound.wrong();api.wrong();
        setTimeout(()=>{a.classList.remove("bad","sel");it.classList.remove("bad");},420);sel=null;
      }
    });
    return it;
  }
  L.forEach(o=>left.append(mk("L",o)));
  R.forEach(o=>right.append(mk("R",o)));
};

/* Reihenfolge (anklicken in richtiger Reihenfolge) */
RENDER.order=(ex,host,api)=>{
  if(ex.mascot)host.append(mascotRow(ex.mascot,"think"));
  host.append(el("div",{class:"center big",html:ex.q}));
  if(ex.hint)host.append(hintBlock(ex.hint));
  const target=el("div",{class:"dnd-pool"});host.append(el("div",{class:"center muted"},"Tippe in der richtigen Reihenfolge:"));
  const pool=el("div",{class:"dnd-pool"});host.append(pool);host.append(target);
  const sorted=ex.items.slice().sort((a,b)=>a.val-b.val);
  let nextIdx=0;
  shuffle(ex.items).forEach(it=>{
    const chip=el("div",{class:"chip"});chip.innerHTML=it.label;
    chip.addEventListener("click",()=>{
      if(chip.classList.contains("placed"))return;
      if(it.val===sorted[nextIdx].val){
        chip.classList.add("placed");chip.style.borderColor="var(--green)";
        target.append(chip);Sound.good();nextIdx++;
        if(nextIdx>=sorted.length)setTimeout(()=>api.done(true),250);
      }else{chip.classList.add("drag");Sound.wrong();api.wrong();
        toast("Noch nicht – welches kommt zuerst?");
        setTimeout(()=>chip.classList.remove("drag"),300);}
    });
    pool.append(chip);
  });
};

/* Richtig / Falsch */
RENDER.tf=(ex,host,api)=>{
  if(ex.mascot)host.append(mascotRow(ex.mascot,"think"));
  host.append(el("div",{class:"center big",html:ex.q}));
  if(ex.clock){const c=Clock(ex.clock);const w=el("div",{class:"clock-wrap"});w.append(c.svg);host.append(w);}
  const grid=el("div",{class:"options cols2"});
  [["✅ Richtig",true],["❌ Falsch",false]].forEach(([lab,val])=>{
    const o=el("div",{class:"opt"});o.textContent=lab;
    o.addEventListener("click",()=>{
      if(val===ex.answer){o.classList.add("correct");api.done(true);}
      else{o.classList.add("wrong");api.wrong();api.done(false);}
    });
    grid.append(o);
  });
  host.append(grid);
};

/* Zahleneingabe (mit +/- oder Tastatur) */
RENDER.input=(ex,host,api)=>{
  if(ex.mascot)host.append(mascotRow(ex.mascot,"think"));
  host.append(el("div",{class:"center big",html:ex.q}));
  if(ex.clock){const c=Clock(ex.clock);const w=el("div",{class:"clock-wrap"});w.append(c.svg);host.append(w);}
  if(ex.hint)host.append(hintBlock(ex.hint));
  let val=ex.start||0;
  const row=el("div",{class:"setrow"});
  const g=el("div",{class:"setgrp"});
  g.append(el("div",{class:"lab"},ex.label||"Antwort"));
  const ctr=el("div",{class:"ctr"});
  const valEl=el("span",{class:"val"},String(val)+(ex.suffix?" "+ex.suffix:""));
  ctr.append(
    el("button",{class:"stepbtn",onclick:()=>{Sound.click();val=Math.max(ex.min??0,val-(ex.step||1));valEl.textContent=val+(ex.suffix?" "+ex.suffix:"");}},"−"),
    valEl,
    el("button",{class:"stepbtn",onclick:()=>{Sound.click();val=Math.min(ex.max??999,val+(ex.step||1));valEl.textContent=val+(ex.suffix?" "+ex.suffix:"");}},"+")
  );
  g.append(ctr);row.append(g);host.append(row);
  host.append(el("div",{class:"center",style:"margin-top:10px"},
    el("button",{class:"btn green lg",onclick:()=>{
      if(val===ex.answer){api.done(true);}else{api.wrong();toast("Noch nicht ganz – probiere weiter!");api.done(false);}
    }},"✓ Fertig")));
};

function hintBlock(text){
  const wrap=el("div",{class:"center",style:"margin:8px 0"});
  const btn=el("button",{class:"hintbtn"},"💡 Tipp");
  const box=el("div",{class:"feedback no",style:"justify-content:center;margin-top:8px"});
  box.innerHTML='<span class="fi">💡</span><div>'+text+'</div>';
  btn.addEventListener("click",()=>{Sound.click();box.classList.toggle("show");});
  wrap.append(btn,box);return wrap;
}
