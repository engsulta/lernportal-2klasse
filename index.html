<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lernportal · 2. Klasse</title>
<link rel="stylesheet" href="shared/styles.css">
<!-- Als App installierbar (Home-Bildschirm / Desktop) -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7ec8ff">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lernportal">
</head>
<body>
<canvas id="confetti" style="display:none"></canvas>

<div id="app">
  <div class="topbar">
    <div class="brand"><span class="logo">🎒</span><span>Lernportal · 2. Klasse</span></div>
    <div class="score"><span class="star">★</span><span id="totalStars">0</span></div>
  </div>
  <div id="screen"></div>
</div>

<div class="toast" id="toast"></div>

<script src="shared/config.js"></script>
<script src="shared/cloud.js"></script>
<script>
"use strict";

/* kleiner DOM-Helfer */
const el=(t,a={},...kids)=>{const n=document.createElement(t);
  for(const k in a){ if(k==="class")n.className=a[k];
    else if(k==="html")n.innerHTML=a[k];
    else if(k.startsWith("on")&&typeof a[k]==="function")n.addEventListener(k.slice(2),a[k]);
    else if(a[k]!=null)n.setAttribute(k,a[k]); }
  for(const c of kids){ if(c==null)continue; n.append(c.nodeType?c:document.createTextNode(c)); }
  return n;};
const $=s=>document.querySelector(s);
function updTotal(){ const e=$("#totalStars"); if(e) e.textContent=SchoolCloud.grandTotal(); }

/* =========================================================================
   THEMEN  –  neues Fach spaeter einfach hier ergaenzen: {id,name,emoji,sub,
   href, ready:true}. Der Fortschritt jedes Themas synct automatisch mit.
   ========================================================================= */
const TOPICS=[
  { id:"uhrzeit", name:"Uhrzeit", emoji:"⏰", sub:"Die Uhr lesen & einstellen",
    href:"topics/uhrzeit/index.html", ready:true },
  { id:"verben-nomen", name:"Nomen & Verben", emoji:"🔎", sub:"Wörter unterscheiden",
    href:"topics/verben-nomen/index.html", ready:true }
];

function renderPortal(){
  updTotal();
  const wrap=el("div",{class:"screen"});
  wrap.append(el("h1",{class:"hub-title"},"🎒 Lernportal · 2. Klasse"));
  wrap.append(el("div",{class:"hub-sub"},"Wähle ein Thema zum Üben!"));

  const grid=el("div",{class:"stations"});
  TOPICS.forEach((t,i)=>{
    const stars=SchoolCloud.topicTotal(t.id);
    const card=el("div",{class:"station"+(t.ready?"":" locked")});
    card.append(el("span",{class:"num"},String(i+1)));
    card.append(el("span",{class:"emoji"},t.emoji));
    card.append(el("div",{class:"nm"},t.name));
    if(t.sub) card.append(el("div",{class:"muted",style:"font-size:.85rem;margin-top:2px"},t.sub));
    if(t.ready){
      card.append(el("div",{style:"margin-top:6px;font-weight:800;color:var(--gold)"},"★ "+stars));
      card.addEventListener("click",()=>{ location.href=t.href; });
    }
    grid.append(card);
  });

  // Platzhalter, damit klar ist: hier kommen spaeter weitere Faecher dazu
  const soon=el("div",{class:"station locked"});
  soon.append(el("span",{class:"emoji"},"➕"));
  soon.append(el("div",{class:"nm"},"Weitere Themen folgen"));
  soon.append(el("div",{class:"muted",style:"font-size:.82rem;margin-top:4px"},"z. B. Rechnen, Einmaleins …"));
  grid.append(soon);

  wrap.append(grid);

  const foot=el("div",{class:"center",style:"margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"});
  foot.append(el("button",{class:"btn blue",onclick:()=>renderReport()},"📊 Elternbericht"));
  foot.append(el("button",{class:"btn gray",onclick:()=>{
      if(confirm("Wirklich den Fortschritt in ALLEN Themen zurücksetzen?")){ SchoolCloud.resetAll(); renderPortal(); }
    }},"↺ Alles zurücksetzen"));
  if(SchoolCloud.ready()){
    foot.append(el("button",{class:"btn gray",onclick:()=>SchoolCloud.showCodeScreen(false,renderPortal)},
      "☁️ Code: "+(SchoolCloud.code()||"—")));
  }
  wrap.append(foot);

  const host=$("#screen"); host.innerHTML=""; host.append(wrap); window.scrollTo(0,0);
}

/* =========================================================================
   ELTERNBERICHT  –  zeigt, bei welchen Fragen die meisten Fehler passieren
   ========================================================================= */
function renderReport(){
  const stats=SchoolCloud.getStats();
  const topicName=id=>{ const t=TOPICS.find(x=>x.id===id); return t?t.name:id; };
  const wrap=el("div",{class:"screen"});
  wrap.append(el("h1",{class:"hub-title"},"📊 Elternbericht"));
  wrap.append(el("div",{class:"hub-sub"},"Wo passieren die meisten Fehler?"));

  const card=el("div",{class:"card"});
  const topicIds=Object.keys(stats);
  let totalWrong=0, openCount=0, anyActive=false;
  const isActive=e=>(e.wrong||0)>0 && (e.lastAt||0)>(e.clearedAt||0);   // offen = Fehler & seit dem letzten Üben nicht gelöst

  topicIds.forEach(tid=>{
    const items=Object.entries(stats[tid]||{})
      .filter(([k,e])=>isActive(e))
      .sort((a,b)=>(b[1].wrong||0)-(a[1].wrong||0));
    if(items.length===0) return;
    anyActive=true;
    const tWrong=items.reduce((s,[k,e])=>s+(e.wrong||0),0);
    totalWrong+=tWrong; openCount+=items.length;
    card.append(el("h2",{style:"margin:16px 0 4px"}, topicName(tid),
      el("span",{class:"muted",style:"font-size:1rem;font-weight:700"}, "  · "+tWrong+" Fehler")));
    items.forEach(([key,e])=>{
      const sep=key.indexOf("#"); const station=key.slice(0,sep), exi=key.slice(sep+1);
      const row=el("div",{style:"display:flex;gap:12px;align-items:center;padding:10px 6px;border-bottom:1px solid #eef2f7;border-radius:12px;cursor:pointer",
        onclick:()=>{ location.href="topics/"+tid+"/index.html#practice="+encodeURIComponent(station+":"+exi); }});
      row.addEventListener("mouseenter",()=>row.style.background="#f4f9ff");
      row.addEventListener("mouseleave",()=>row.style.background="");
      row.append(el("div",{style:"font-weight:900;color:var(--red-d);min-width:52px;text-align:right"}, "❌ "+(e.wrong||0)+"×"));
      const txt=el("div",{style:"flex:1"});
      txt.append(el("div",{style:"font-weight:700"}, e.label||"(Frage)"));
      const meta=[];
      if(e.station) meta.push("Station: "+e.station);
      if(e.lastAt) meta.push("zuletzt "+new Date(e.lastAt).toLocaleDateString("de-DE"));
      txt.append(el("div",{class:"muted",style:"font-size:.9rem"}, meta.join(" · ")));
      row.append(txt);
      row.append(el("div",{style:"font-size:1.3rem;color:var(--blue);font-weight:900"},"▶"));
      card.append(row);
    });
  });

  if(!anyActive){
    card.append(el("div",{class:"center muted",style:"padding:24px 8px"},
      topicIds.length ? "✅ Keine offenen Fehler – alles gemeistert! Super gemacht. 🎉"
                      : "Noch keine Daten. Sobald geübt wird, siehst du hier, welche Fragen schwerfallen."));
  } else {
    card.append(el("div",{class:"muted center",style:"margin-top:12px;font-size:.9rem"},
      "👉 Tippe auf eine Frage, um sie noch einmal zu üben. Richtig gelöst = verschwindet aus der Liste."));
  }
  wrap.append(card);

  if(anyActive){
    wrap.append(el("div",{class:"center muted",style:"margin-top:8px"},
      "Offen: "+openCount+" Frage(n) · "+totalWrong+" Fehler insgesamt."));
  }

  const foot=el("div",{class:"center",style:"margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"});
  foot.append(el("button",{class:"btn green",onclick:()=>renderPortal()},"← Zurück"));
  foot.append(el("button",{class:"btn gray",onclick:()=>{
      if(confirm("Fehler-Bericht zurücksetzen? (Der Spielstand mit den Sternen bleibt erhalten.)")){ SchoolCloud.resetStats(); renderReport(); }
    }},"🧹 Bericht leeren"));
  wrap.append(foot);

  const host=$("#screen"); host.innerHTML=""; host.append(wrap); window.scrollTo(0,0);
}

/* Start: gemeinsamen Spielstand laden/synchronisieren, dann Portal (oder Bericht) zeigen */
function portalHome(){
  if(location.hash==="#report"){ history.replaceState(null,"",location.pathname); renderReport(); }
  else renderPortal();
}
SchoolCloud.bootSync(portalHome);

/* App-Installation & Offline-Betrieb */
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
